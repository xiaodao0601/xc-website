<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>双生花</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 背景层 -->
    <div class="bg-layer" id="bgLayer"></div>
    
    <!-- 主内容区 -->
    <div class="container">
        <!-- 头像 -->
        <div class="avatar-section" id="avatarSection">
            <div class="avatar-wrapper">
                <img src="https://pic1.imgdb.cn/pic/20250419/1727517619.jpg" alt="头像" class="avatar">
            </div>
        </div>
        
        <!-- 个人介绍 -->
        <div class="intro-section" id="introSection">
            <div class="glass-card intro-card">
                <h1 class="name">双生花</h1>
                <p class="desc">温柔如她，陪伴如影</p>
            </div>
        </div>
        
        <!-- 轮播图 -->
        <div class="carousel-section" id="carouselSection">
            <div class="carousel-container">
                <div class="carousel-track" id="carouselTrack">
                    <div class="carousel-slide">
                        <img src="https://picsum.photos/seed/xc1/400/200" alt="轮播1">
                    </div>
                    <div class="carousel-slide">
                        <img src="https://picsum.photos/seed/xc2/400/200" alt="轮播2">
                    </div>
                    <div class="carousel-slide">
                        <img src="https://picsum.photos/seed/xc3/400/200" alt="轮播3">
                    </div>
                    <div class="carousel-slide">
                        <img src="https://picsum.photos/seed/xc4/400/200" alt="轮播4">
                    </div>
                </div>
                <div class="carousel-dots" id="carouselDots"></div>
            </div>
        </div>
        
        <!-- 底部功能按钮 -->
        <div class="footer-section" id="footerSection">
            <button class="glass-btn files-btn" id="filesBtn">
                <span class="btn-icon">📁</span>
                <span class="btn-text">文件</span>
            </button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
