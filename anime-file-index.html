<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的二次元文件库</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffb7c5 0%, #a8e6cf 50%, #88d8f5 100%);
            background-attachment: fixed;
            padding: 20px;
            padding-bottom: 40px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 头部卡片 */
        .header-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(255, 182, 193, 0.3);
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 20px rgba(255, 182, 193, 0.5);
            object-fit: cover;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-left: auto;
            margin-right: auto;
        }

        .nickname {
            font-size: 24px;
            font-weight: 700;
            color: #5a4a7a;
            margin-bottom: 8px;
        }

        .intro {
            font-size: 14px;
            color: #7a6a9a;
            line-height: 1.6;
        }

        /* 分类标签 */
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #6a5a8a;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
        }

        .tab.active {
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.5);
        }

        /* 文件列表 */
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }

        .file-card:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 20px rgba(255, 182, 193, 0.3);
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 16px;
            font-weight: 500;
            color: #4a4a6a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .file-size {
            font-size: 12px;
            color: #9a8aaa;
        }

        .download-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
            white-space: nowrap;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8a7a9a;
            font-size: 14px;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .header-card {
                padding: 20px;
            }
            
            .avatar {
                width: 80px;
                height: 80px;
                font-size: 32px;
            }
            
            .nickname {
                font-size: 20px;
            }
            
            .file-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            
            .download-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header-card">
            <div class="avatar">🎀</div>
            <div class="nickname">小鱼儿的文件库</div>
            <div class="intro">这里存放着我收集的各种宝藏～<br>希望你喜欢！</div>
        </div>

        <!-- 分类标签 -->
        <div class="category-tabs" id="categoryTabs">
            <button class="tab active" data-category="all">全部</button>
            <button class="tab" data-category="software">软件</button>
            <button class="tab" data-category="game">游戏</button>
            <button class="tab" data-category="document">文档</button>
        </div>

        <!-- 文件列表 -->
        <div class="file-list" id="fileList"></div>
    </div>

    <script>
        // ===== 在这里修改你的文件数据 =====
        const fileData = [
            {
                name: "清爽简约壁纸包",
                size: "15.2 MB",
                category: "software",
                url: "https://example.com/wallpaper.zip"
            },
            {
                name: "原神破解版 v3.2",
                size: "1.8 GB",
                category: "game",
                url: "https://example.com/genshin.apk"
            },
            {
                name: "AI学习笔记整理",
                size: "2.3 MB",
                category: "document",
                url: "https://example.com/notes.pdf"
            },
            {
                name: "VSCode主题集合",
                size: "580 KB",
                category: "software",
                url: "https://example.com/theme.zip"
            },
            {
                name: "赛博朋克2077存档",
                size: "45 KB",
                category: "game",
                url: "https://example.com/save.zip"
            }
        ];
        // ==================================

        // DOM 元素
        const categoryTabs = document.getElementById('categoryTabs');
        const fileList = document.getElementById('fileList');

        // 渲染文件列表
        function renderFiles(category) {
            const filtered = category === 'all' 
                ? fileData 
                : fileData.filter(f => f.category === category);
            
            if (filtered.length === 0) {
                fileList.innerHTML = '<div class="empty-state">这个分类还没有文件哦～</div>';
                return;
            }

            fileList.innerHTML = filtered.map(file => `
                <div class="file-card">
                    <div class="file-info">
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${file.size}</div>
                    </div>
                    <a href="${file.url}" class="download-btn" target="_blank">下载</a>
                </div>
            `).join('');
        }

        // 分类切换
        categoryTabs.addEventListener('click', (e) => {
            if (e.target.classList.contains('tab')) {
                // 移除所有 active
                categoryTabs.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                // 添加 active 到点击的标签
                e.target.classList.add('active');
                // 渲染对应分类
                renderFiles(e.target.dataset.category);
            }
        });

        // 初始渲染
        renderFiles('all');
    </script>
</body>
</html>
